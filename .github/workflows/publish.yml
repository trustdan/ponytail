name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.
      - run: npm install -g npm@latest
      # No token: id-token: write above lets npm authenticate via OIDC, and
      # provenance is attached automatically. access set in publishConfig.
      - run: npm publish

  # Cut the GitHub Release with cross-platform archives + checksums. Tag-only:
  # goreleaser derives the version from the tag, so it can't run on a bare
  # workflow_dispatch.
  goreleaser:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
