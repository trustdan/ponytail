name: test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps for correctness checks
        run: pip install pandas

      - name: Go tests (hooks + generation)
        run: go test ./...

      - name: Check generated artifacts and versions are in sync
        run: go run ./cmd/ponytail check

      # Committed binaries must match a fresh reproducible build, or a Go edit
      # without a rebuild would ship a stale binary to every host.
      - name: Rebuild committed binaries
        run: sh scripts/build-bin.sh

      - name: Check committed binaries are in sync
        run: git diff --exit-code bin/

      - name: Run tests
        run: npm test
